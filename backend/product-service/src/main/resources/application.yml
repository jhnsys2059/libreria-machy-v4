server:
  port: ${PORT:8082}

spring:
  application:
    name: product-service
  datasource:
    url: jdbc:postgresql://ep-crimson-paper-ataoeczu-pooler.c-9.us-east-1.aws.neon.tech/neondb?sslmode=require&currentSchema=product_schema
    username: ${DB_USERNAME:neondb_owner}
    password: ${DB_PASSWORD:npg_tbdKHk45vIMg}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 600000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: product_schema
  jackson:
    default-property-inclusion: non_null
    time-zone: America/Lima

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    hostname: ${SERVICE_HOSTNAME:localhost}
    prefer-ip-address: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
