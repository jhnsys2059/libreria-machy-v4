server:
  port: ${PORT:8080}

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      httpclient:
        response-timeout: 10s
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
        - id: users-route
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/users/**
        - id: config-route
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/config
        - id: product-service
          uri: ${PRODUCT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/products/**
        - id: categories-route
          uri: ${PRODUCT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/categories/**
        - id: suppliers-route
          uri: ${PRODUCT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/suppliers/**
        - id: sale-service
          uri: ${SALE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/sales/**
        - id: dashboard-route
          uri: ${SALE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/dashboard
        - id: attendance-route
          uri: ${SALE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/attendance/**
        - id: scan-route
          uri: ${SALE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/scan/**
        - id: websocket-route
          uri: ${SALE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/ws/**


      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: ${CORS_ORIGINS:*}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    hostname: ${SERVICE_HOSTNAME:localhost}
    prefer-ip-address: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true
