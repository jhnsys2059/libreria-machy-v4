server:
  port: ${PORT:8761}

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
  instance:
    hostname: ${HOSTNAME:localhost}
    prefer-ip-address: true
  server:
    wait-time-in-ms-when-sync-empty: 0

spring:
  application:
    name: discovery-service

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
