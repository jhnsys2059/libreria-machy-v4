server:
  port: ${PORT:8081}

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://ep-crimson-paper-ataoeczu-pooler.c-9.us-east-1.aws.neon.tech/neondb?sslmode=require&currentSchema=auth_schema
    username: ${DB_USERNAME:neondb_owner}
    password: ${DB_PASSWORD:npg_tbdKHk45vIMg}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 600000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: auth_schema
  jackson:
    default-property-inclusion: non_null
    time-zone: America/Lima
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    hostname: ${SERVICE_HOSTNAME:localhost}
    prefer-ip-address: false

app:
  jwt:
    secret: libreria_machy_jwt_secret_key_2024_v4_microservices_very_long
    expiration-ms: 28800000
  smtp:
    from: ${SMTP_FROM:${SMTP_USERNAME:}}
  blacklist:
    max-size: 1000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
